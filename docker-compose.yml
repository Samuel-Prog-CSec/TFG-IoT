# ============================================================================
# Docker Compose - Plataforma de Juegos Educativos con RFID
# ============================================================================
# Servicios: Frontend, Backend, MongoDB, Redis
# Perfiles: default (todos), debug (+ herramientas admin)
#
# Uso básico:
#   docker compose up -d              # Iniciar todos los servicios
#   docker compose down               # Detener servicios
#   docker compose logs -f backend    # Ver logs del backend
#
# Perfiles:
#   docker compose --profile debug up -d    # Con Redis Commander + Mongo Express
#
# Autor: Samuel Blanchart Pérez
# Versión: 1.0.0
# ============================================================================

services:
  # ============================================
  # FRONTEND (React + Nginx)
  # ============================================
  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_URL=http://localhost/api
    container_name: rfid-games-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=frontend"
      - "com.rfid-games.description=React SPA served by Nginx"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ============================================
  # BACKEND (Node.js API REST)
  # ============================================
  backend:
    build: ./backend
    container_name: rfid-games-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=${NODE_ENV:-development}
      # Conexión interna a servicios Docker
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/rfid_games_db
    env_file:
      - .env
    depends_on:
      redis:
        condition: service_healthy
      mongo:
        condition: service_healthy
    command: >
      sh -c "npm run seed:reset && npm run migrate:sessions && npm start"
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=backend"
      - "com.rfid-games.description=Express API server"
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:5000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ============================================
  # BASE DE DATOS (MongoDB Local)
  # ============================================
  mongo:
    image: mongo:7
    container_name: rfid-games-mongo
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=database"
      - "com.rfid-games.description=MongoDB database"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ============================================
  # REDIS - Caché, tokens y estado de partidas
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rfid-games-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --loglevel notice
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=cache"
      - "com.rfid-games.description=Redis cache and session store"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ============================================
  # REDIS COMMANDER - UI para debugging Redis
  # Acceder en: http://localhost:8081
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rfid-games-redis-ui
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - debug
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=debug-tool"
      - "com.rfid-games.description=Redis web UI"

  # ============================================
  # MONGO EXPRESS - UI para debugging MongoDB
  # Acceder en: http://localhost:8082
  # ============================================
  mongo-express:
    image: mongo-express:latest
    container_name: rfid-games-mongo-ui
    restart: unless-stopped
    ports:
      - "${MONGO_EXPRESS_PORT:-8082}:8081"
    environment:
      - ME_CONFIG_MONGODB_URL=mongodb://mongo:27017/
      - ME_CONFIG_BASICAUTH=false
    depends_on:
      mongo:
        condition: service_healthy
    profiles:
      - debug
    networks:
      - rfid-games-network
    labels:
      - "com.rfid-games.service=debug-tool"
      - "com.rfid-games.description=MongoDB web UI"

# ============================================
# VOLÚMENES PERSISTENTES
# ============================================
volumes:
  redis-data:
    driver: local
    name: rfid-games-redis-data
  mongo-data:
    driver: local
    name: rfid-games-mongo-data

# ============================================
# RED INTERNA
# ============================================
networks:
  rfid-games-network:
    driver: bridge
    name: rfid-games-network
