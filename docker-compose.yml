# Docker compose - Plataforma de juegos educativos con RFID
# Servicios: Redis (caché y estado de partidas) y Redis Commander (UI de administración)
#
# Uso:
#   docker-compose up -d          # Iniciar servicios en background
#   docker-compose down           # Detener servicios
#   docker-compose logs -f redis  # Ver logs de Redis en tiempo real
#
# Autor: Samuel Blanchart Pérez
# Versión: 0.2.0

services:
  # ============================================
  # FRONTEND (React + Nginx)
  # ============================================
  frontend:
    build: ./frontend
    container_name: rfid-games-frontend
    restart: unless-stopped
    ports:
      - "80:80"  # Acceso en http://localhost
    depends_on:
      - backend
    networks:
      - rfid-games-network
  
  # ============================================
  # BACKEND (Node.js API REST)
  # ============================================
  backend:
    build: ./backend
    container_name: rfid-games-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      # Conexión interna a servicios Docker (usamos los nombres del servicio)
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=mongodb://mongo:27017/rfid_games_db
    env_file:
      - .env
    depends_on:
      - redis
      - mongo
    networks:
      - rfid-games-network

  # ============================================
  # BASE DE DATOS (MongoDB Local)
  # ============================================
  mongo:
    image: mongo:6.0
    container_name: rfid-games-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - rfid-games-network

  # ============================================
  # REDIS - Caché, tokens y estado de partidas
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rfid-games-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      # Persistencia de datos - sobrevive reinicios
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --tcp-keepalive 60
      --timeout 0
      --loglevel notice
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - rfid-games-network

  # ============================================
  # REDIS COMMANDER - UI para debugging y administración
  # Acceder en: http://localhost:8081
  # ============================================
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: rfid-games-redis-ui
    restart: unless-stopped
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    environment:
      - REDIS_HOSTS=local:redis:6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - debug
    networks:
      - rfid-games-network

# ============================================
# VOLÚMENES PERSISTENTES
# ============================================
volumes:
  redis-data:
    driver: local
    name: rfid-games-redis-data
  mongo-data:
    driver: local
    name: rfid-games-mongo-data

# ============================================
# RED INTERNA
# ============================================
networks:
  rfid-games-network:
    driver: bridge
    name: rfid-games-network
