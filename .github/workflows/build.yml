name: Build

on:
  push:
    branches: [ "main", "develop", "Maintenance" ]
  pull_request:
    types: [ "opened", "synchronize", "reopened" ]
    branches: [ "main", "develop", "Maintenance" ]

jobs:
  quality:
    name: Calidad backend y frontend
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: ['24.x']
        mongodb-version: ['8.0']

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # Importante para SonarCloud

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v6
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.12.1
      with:
        mongodb-version: ${{ matrix.mongodb-version }}

    - name: Install Backend Dependencies
      run: npm ci
      working-directory: ./backend

    - name: Audit Backend Dependencies
      run: npm audit --audit-level=high
      working-directory: ./backend

    - name: Run Backend Linter
      run: npm run lint --if-present
      working-directory: ./backend

    - name: Run Backend Tests
      # Ejecuta los tests definidos en el package.json
      run: npm test
      working-directory: ./backend
      env:
        JWT_SECRET: "test_secret"
        MONGODB_URI: "mongodb://localhost:27017/rfid_games_test"

    - name: Normalize backend LCOV paths for SonarCloud
      run: |
        sed -i 's#^SF:src/#SF:backend/src/#; s#^SF:src\\#SF:backend/src/#' backend/coverage/lcov.info

    - name: Install Frontend Dependencies
      run: npm ci
      working-directory: ./frontend

    - name: Run Frontend Linter
      run: npm run lint --if-present
      working-directory: ./frontend

    - name: SonarCloud Scan
      uses: SonarSource/sonarcloud-github-action@v4
      env:
        SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        SONAR_HOST_URL: https://sonarcloud.io