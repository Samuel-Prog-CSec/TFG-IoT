name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

jobs:
  backend-quality:
    name: Test de calidad y testing del backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend

    strategy:
      matrix:
        node-version: [24.x]
        mongodb-version: ['6.0']

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0  # Importante para SonarCloud

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
        cache-dependency-path: backend/package-lock.json

    - name: Start MongoDB
      uses: supercharge/mongodb-github-action@1.10.0
      with:
        mongodb-version: ${{ matrix.mongodb-version }}

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter
      run: npm run lint --if-present

    - name: Run Tests
      # Ejecuta los tests definidos en tu package.json
      run: npm test
      env:
        JWT_SECRET: "test_secret"
        MONGODB_URI: "mongodb://localhost:27017/rfid_games_test"

  sonarcloud:
    name: Análisis de SonarCloud
    runs-on: ubuntu-latest
    needs: backend-quality # Solo ejecuta si los tests pasan
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}