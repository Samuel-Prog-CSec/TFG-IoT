version: 2
updates:
  # -------------------------
  # ROOT (NPM) — husky, commitlint, lint-staged
  # -------------------------
  - package-ecosystem: "npm"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "06:45"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "root"
    commit-message:
      prefix: "npm-root"
      prefix-development: "npm-root-dev"
    groups:
      safe-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  # -------------------------
  # BACKEND (NPM)
  # -------------------------
  - package-ecosystem: "npm"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:00"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "backend"
    commit-message:
      prefix: "npm-back"
      prefix-development: "npm-back-dev"
    groups:
      # Seguridad crítica: separar para merge rápido
      security-patches:
        patterns:
          - "helmet"
          - "jsonwebtoken"
          - "bcrypt"
          - "cors"
          - "@sentry/*"
        update-types:
          - "minor"
          - "patch"
      # Actualizaciones seguras (minor + patch del resto)
      safe-updates:
        patterns:
          - "*"
        exclude-patterns:
          - "helmet"
          - "jsonwebtoken"
          - "bcrypt"
          - "cors"
          - "@sentry/*"
        update-types:
          - "minor"
          - "patch"
      # Mayores: riesgo de ruptura, revisar con cuidado
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  # -------------------------
  # FRONTEND (NPM)
  # -------------------------
  - package-ecosystem: "npm"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:15"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "npm-front"
      prefix-development: "npm-front-dev"
    groups:
      safe-updates:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
      major-updates:
        patterns:
          - "*"
        update-types:
          - "major"

  # -------------------------
  # DOCKER (imágenes base: node, nginx)
  # -------------------------
  - package-ecosystem: "docker"
    directory: "/backend"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker-back"

  - package-ecosystem: "docker"
    directory: "/frontend"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:30"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker-front"

  # -------------------------
  # GITHUB ACTIONS
  # -------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    target-branch: "develop"
    schedule:
      interval: "monthly"
      day: "monday"
      time: "07:45"
      timezone: "Europe/Madrid"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "gh-actions"
    groups:
      all-actions:
        patterns:
          - "*"