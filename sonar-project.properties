sonar.projectKey=Samuel-Prog-CSec_TFG-IoT
sonar.organization=samuel-github-projects


# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=TFG-IoT
sonar.projectVersion=0.2.0


# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=backend,frontend

# Tests y cobertura
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.coverage.exclusions=frontend/**,**/*.config.{js,mjs,cjs},**/eslint.config.js,**/vite.config.js,**/jest.config.js,**/tests/**,**/__tests__/**,**/*.test.{js,jsx,ts,tsx},**/*.spec.{js,jsx,ts,tsx}
sonar.newCode.referenceBranch=main

# Desactivar análisis C/C++/ObjC (evita el sensor CFamily y el requisito compile_commands)
sonar.c.file.suffixes=-
sonar.cpp.file.suffixes=-
sonar.objc.file.suffixes=-

# Excluir carpetas que no deben analizarse (o que generan mucho ruido)
sonar.exclusions=**/node_modules/**,**/coverage/**,**/dist/**,**/build/**,**/.scannerwork/**,rfid_scanner/**,**/seeders/**,**/docs/**,**/logs/**,**/assets/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8