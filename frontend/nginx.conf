server {
    listen 80;

    # 1. Servir el Frontend (Vite)
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. Proxy para el Backend (API)
    # Cualquier petición a http://localhost/api irá al contenedor backend
    location /api/ {
        proxy_pass http://rfid-games-backend:5000/api/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # 3. Proxy para WebSockets (Socket.io)
    location /socket.io/ {
        proxy_pass http://rfid-games-backend:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
    }
}